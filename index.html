<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基于题库的学习助手</title>
<!--
  使用说明：
  1. 打开此文件即可开始学习，默认加载内嵌示例题库。
  2. 左侧/上方为知识点大纲，点击可筛选练习范围。
  3. 右侧/下方为练习区，选择答案后点击"提交答案"查看反馈。
  4. 点击"下一题"继续练习，系统优先出掌握度低的题目。
  5. 页面底部可导入自定义题库（JSON格式）或重置学习进度。
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    line-height: 1.6;
  }

  /* 顶部标题 */
  header {
    background: #4a90d9;
    color: #fff;
    padding: 1.2rem 1.5rem;
    text-align: center;
  }
  header h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
  header p { font-size: 0.9rem; opacity: 0.9; }

  /* 主区域 */
  .main-container {
    display: flex;
    gap: 1.2rem;
    max-width: 1100px;
    margin: 1.2rem auto;
    padding: 0 1rem;
  }

  /* 左侧大纲 */
  .sidebar {
    flex: 0 0 280px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 1rem;
    align-self: flex-start;
  }
  .sidebar h2 { font-size: 1.1rem; margin-bottom: 0.8rem; color: #4a90d9; }
  .kp-list { list-style: none; }
  .kp-item {
    padding: 0.7rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 0.4rem;
    transition: background 0.2s;
    border: 1px solid transparent;
  }
  .kp-item:hover { background: #e8f0fe; }
  .kp-item.active { background: #d2e3fc; border-color: #4a90d9; }
  .kp-name { font-weight: 600; font-size: 0.95rem; }
  .kp-meta { font-size: 0.8rem; color: #666; margin-top: 0.2rem; }
  .kp-progress-bar {
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    margin-top: 0.3rem;
    overflow: hidden;
  }
  .kp-progress-fill {
    height: 100%;
    background: #4caf50;
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* 右侧练习区 */
  .practice-area {
    flex: 1;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 1.5rem;
    min-height: 400px;
  }
  .practice-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .practice-title { font-size: 1rem; color: #4a90d9; font-weight: 600; }
  .practice-counter { font-size: 0.85rem; color: #888; }

  .question-text {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    padding: 0.8rem;
    background: #f9fafe;
    border-radius: 6px;
    border-left: 4px solid #4a90d9;
  }

  .options-list { list-style: none; margin-bottom: 1rem; }
  .option-item {
    display: flex;
    align-items: center;
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.5rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .option-item:hover:not(.disabled) { background: #f5f7fa; border-color: #4a90d9; }
  .option-item.disabled { cursor: default; opacity: 0.85; }
  .option-item.correct-answer { background: #e8f5e9; border-color: #4caf50; }
  .option-item.wrong-answer { background: #ffebee; border-color: #f44336; }
  .option-item input[type="radio"] { margin-right: 0.6rem; flex-shrink: 0; }
  .option-label { font-weight: 600; margin-right: 0.4rem; color: #4a90d9; }

  .explanation-box {
    display: none;
    padding: 0.8rem;
    margin-bottom: 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  .explanation-box.show { display: block; }
  .explanation-box.correct { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .explanation-box.wrong { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

  .btn {
    display: inline-block;
    padding: 0.6rem 1.4rem;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #4a90d9; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #3a7bc8; }
  .btn-success { background: #4caf50; color: #fff; }
  .btn-success:hover:not(:disabled) { background: #43a047; }
  .btn-danger { background: #f44336; color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #e53935; }
  .btn-secondary { background: #78909c; color: #fff; }
  .btn-secondary:hover:not(:disabled) { background: #607d8b; }

  .action-buttons { display: flex; gap: 0.6rem; flex-wrap: wrap; }

  .empty-state {
    text-align: center;
    color: #999;
    padding: 3rem 1rem;
    font-size: 1rem;
  }

  .cycle-notice {
    display: none;
    padding: 0.5rem 0.8rem;
    margin-bottom: 0.8rem;
    background: #fff3e0;
    color: #e65100;
    border-radius: 6px;
    font-size: 0.85rem;
    border: 1px solid #ffe0b2;
  }
  .cycle-notice.show { display: block; }

  /* 底部区域 */
  .footer-area {
    max-width: 1100px;
    margin: 1.2rem auto;
    padding: 0 1rem 2rem;
  }
  .import-section {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 1rem 1.5rem;
    margin-bottom: 1rem;
  }
  .import-toggle {
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    color: #4a90d9;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .import-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .import-toggle .arrow.open { transform: rotate(90deg); }
  .import-body { display: none; margin-top: 0.8rem; }
  .import-body.show { display: block; }
  .import-body textarea {
    width: 100%;
    min-height: 120px;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 0.6rem;
    font-family: monospace;
    font-size: 0.85rem;
    resize: vertical;
    margin-bottom: 0.6rem;
  }
  .import-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

  /* 响应式 */
  @media (max-width: 600px) {
    .main-container { flex-direction: column; }
    .sidebar { flex: none; width: 100%; }
    .practice-area { min-height: 300px; }
    header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>基于题库的学习助手</h1>
  <p>通过练习逐步掌握知识点，系统自动跟踪学习进度</p>
</header>

<div class="main-container">
  <!-- 知识点大纲 -->
  <aside class="sidebar" id="sidebar">
    <h2>知识点大纲</h2>
    <ul class="kp-list" id="kpList"></ul>
  </aside>

  <!-- 练习区 -->
  <main class="practice-area" id="practiceArea">
    <div class="empty-state" id="emptyState">请从左侧选择知识点开始练习</div>
    <div id="practiceContent" style="display:none;">
      <div class="practice-header">
        <span class="practice-title" id="practiceTitle"></span>
        <span class="practice-counter" id="practiceCounter"></span>
      </div>
      <div class="cycle-notice" id="cycleNotice">已完成一轮，将从头开始循环练习。</div>
      <div class="question-text" id="questionText"></div>
      <ul class="options-list" id="optionsList"></ul>
      <div class="explanation-box" id="explanationBox"></div>
      <div class="action-buttons">
        <button class="btn btn-primary" id="submitBtn" disabled>提交答案</button>
        <button class="btn btn-success" id="nextBtn" style="display:none;">下一题</button>
      </div>
    </div>
  </main>
</div>

<div class="footer-area">
  <div class="import-section">
    <div class="import-toggle" id="importToggle">
      <span class="arrow" id="importArrow">▶</span> 导入自定义题库
    </div>
    <div class="import-body" id="importBody">
      <textarea id="importTextarea" placeholder='粘贴JSON题库数组，格式示例：[{"id":"q1","knowledgePoint":"科学","question":"...","options":["A","B"],"correct":0,"explanation":"..."}]'></textarea>
      <div class="import-actions">
        <button class="btn btn-primary" id="loadBtn">加载题库</button>
        <button class="btn btn-danger" id="resetBtn">重置学习进度</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // ==================== 示例题库 ====================
  var DEFAULT_QUESTIONS = [
    {
      id: "m1",
      knowledgePoint: "数学",
      question: "2 + 2 = ?",
      options: ["3", "4", "5", "6"],
      correct: 1,
      explanation: "2+2=4，故选B。"
    },
    {
      id: "m2",
      knowledgePoint: "数学",
      question: "3 × 7 = ?",
      options: ["18", "20", "21", "24"],
      correct: 2,
      explanation: "3×7=21，故选C。"
    },
    {
      id: "m3",
      knowledgePoint: "数学",
      question: "100 ÷ 4 = ?",
      options: ["20", "25", "30", "50"],
      correct: 1,
      explanation: "100÷4=25，故选B。"
    },
    {
      id: "m4",
      knowledgePoint: "数学",
      question: "15 - 8 = ?",
      options: ["5", "6", "7", "8"],
      correct: 2,
      explanation: "15-8=7，故选C。"
    },
    {
      id: "h1",
      knowledgePoint: "历史",
      question: "中华人民共和国成立于哪一年？",
      options: ["1945年", "1949年", "1950年", "1952年"],
      correct: 1,
      explanation: "中华人民共和国于1949年10月1日成立，故选B。"
    },
    {
      id: "h2",
      knowledgePoint: "历史",
      question: "秦朝的建立者是谁？",
      options: ["刘邦", "项羽", "嬴政", "李斯"],
      correct: 2,
      explanation: "秦始皇嬴政统一六国，建立秦朝，故选C。"
    },
    {
      id: "h3",
      knowledgePoint: "历史",
      question: "丝绸之路的起点城市是？",
      options: ["洛阳", "长安", "开封", "北京"],
      correct: 1,
      explanation: "丝绸之路以长安（今西安）为起点，故选B。"
    }
  ];

  // ==================== 全局状态 ====================
  var questions = [];          // 当前题库
  var progress = {};           // 学习进度 { id: { correct: n, wrong: n } }
  var knowledgePoints = [];    // 知识点名称列表
  var currentKP = null;        // 当前筛选的知识点（null表示全部）
  var currentList = [];        // 当前排序后的题目列表
  var currentIndex = 0;        // 当前题目索引
  var selectedOption = -1;     // 用户选中的选项索引
  var submitted = false;       // 当前题目是否已提交

  var STORAGE_KEY = "learningProgress";

  // ==================== DOM引用 ====================
  var kpListEl = document.getElementById("kpList");
  var practiceContent = document.getElementById("practiceContent");
  var emptyState = document.getElementById("emptyState");
  var practiceTitle = document.getElementById("practiceTitle");
  var practiceCounter = document.getElementById("practiceCounter");
  var cycleNotice = document.getElementById("cycleNotice");
  var questionText = document.getElementById("questionText");
  var optionsList = document.getElementById("optionsList");
  var explanationBox = document.getElementById("explanationBox");
  var submitBtn = document.getElementById("submitBtn");
  var nextBtn = document.getElementById("nextBtn");
  var importToggle = document.getElementById("importToggle");
  var importArrow = document.getElementById("importArrow");
  var importBody = document.getElementById("importBody");
  var importTextarea = document.getElementById("importTextarea");
  var loadBtn = document.getElementById("loadBtn");
  var resetBtn = document.getElementById("resetBtn");

  // ==================== localStorage 读写 ====================

  /** 从localStorage加载进度 */
  function loadProgress() {
    try {
      var data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        progress = JSON.parse(data);
      } else {
        progress = {};
      }
    } catch (e) {
      progress = {};
    }
    // 确保每道题都有记录
    for (var i = 0; i < questions.length; i++) {
      var id = questions[i].id;
      if (!progress[id]) {
        progress[id] = { correct: 0, wrong: 0 };
      }
    }
  }

  /** 保存进度到localStorage */
  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    } catch (e) {
      // 静默处理存储异常
    }
  }

  // ==================== 掌握度计算 ====================

  /** 计算单道题的掌握度 (0~1) */
  function getMastery(questionId) {
    var p = progress[questionId];
    if (!p || (p.correct + p.wrong === 0)) return 0;
    return p.correct / (p.correct + p.wrong);
  }

  /** 计算某知识点的整体掌握度百分比 (0~100整数) */
  function getKPMastery(kpName) {
    var kpQuestions = questions.filter(function(q) { return q.knowledgePoint === kpName; });
    if (kpQuestions.length === 0) return 0;
    var total = 0;
    for (var i = 0; i < kpQuestions.length; i++) {
      total += getMastery(kpQuestions[i].id);
    }
    return Math.round((total / kpQuestions.length) * 100);
  }

  // ==================== 知识点提取 ====================

  /** 从题库中提取唯一知识点列表 */
  function extractKnowledgePoints() {
    var set = {};
    knowledgePoints = [];
    for (var i = 0; i < questions.length; i++) {
      var kp = questions[i].knowledgePoint;
      if (!set[kp]) {
        set[kp] = true;
        knowledgePoints.push(kp);
      }
    }
  }

  // ==================== 大纲渲染 ====================

  /** 渲染知识点大纲列表 */
  function renderOutline() {
    kpListEl.innerHTML = "";

    if (questions.length === 0) {
      kpListEl.innerHTML = '<li style="color:#999;padding:0.5rem;">题库为空</li>';
      return;
    }

    // "全部知识点"条目
    var allItem = document.createElement("li");
    allItem.className = "kp-item" + (currentKP === null ? " active" : "");
    var allCount = questions.length;
    var allMastery = allCount > 0 ? Math.round(questions.reduce(function(s, q) { return s + getMastery(q.id); }, 0) / allCount * 100) : 0;
    allItem.innerHTML =
      '<div class="kp-name">全部知识点</div>' +
      '<div class="kp-meta">' + allCount + '题 · 掌握 ' + allMastery + '%</div>' +
      '<div class="kp-progress-bar"><div class="kp-progress-fill" style="width:' + allMastery + '%"></div></div>';
    allItem.addEventListener("click", function() { selectKP(null); });
    kpListEl.appendChild(allItem);

    // 各知识点条目
    for (var i = 0; i < knowledgePoints.length; i++) {
      (function(kp) {
        var count = questions.filter(function(q) { return q.knowledgePoint === kp; }).length;
        var mastery = getKPMastery(kp);
        var li = document.createElement("li");
        li.className = "kp-item" + (currentKP === kp ? " active" : "");
        li.innerHTML =
          '<div class="kp-name">' + escapeHtml(kp) + '</div>' +
          '<div class="kp-meta">' + count + '题 · 掌握 ' + mastery + '%</div>' +
          '<div class="kp-progress-bar"><div class="kp-progress-fill" style="width:' + mastery + '%"></div></div>';
        li.addEventListener("click", function() { selectKP(kp); });
        kpListEl.appendChild(li);
      })(knowledgePoints[i]);
    }
  }

  // ==================== 练习区核心逻辑 ====================

  /** 选择知识点并刷新练习区 */
  function selectKP(kp) {
    currentKP = kp;
    currentIndex = 0;
    cycleNotice.classList.remove("show");
    buildSortedList();
    renderOutline();
    renderQuestion();
  }

  /** 构建按掌握度升序排列的题目列表（相同掌握度随机排序） */
  function buildSortedList() {
    var filtered;
    if (currentKP === null) {
      filtered = questions.slice();
    } else {
      filtered = questions.filter(function(q) { return q.knowledgePoint === currentKP; });
    }

    // 随机打乱，然后按掌握度升序稳定排序
    shuffle(filtered);
    filtered.sort(function(a, b) {
      return getMastery(a.id) - getMastery(b.id);
    });

    currentList = filtered;
  }

  /** Fisher-Yates洗牌 */
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  }

  /** 渲染当前题目 */
  function renderQuestion() {
    if (currentList.length === 0) {
      practiceContent.style.display = "none";
      emptyState.style.display = "block";
      emptyState.textContent = "当前范围内没有题目";
      return;
    }

    practiceContent.style.display = "block";
    emptyState.style.display = "none";

    var q = currentList[currentIndex];
    practiceTitle.textContent = "当前练习：" + (currentKP === null ? "全部知识点" : escapeHtml(currentKP));
    practiceCounter.textContent = "第" + (currentIndex + 1) + "题 / 共" + currentList.length + "题";

    questionText.textContent = q.question;

    // 渲染选项
    optionsList.innerHTML = "";
    selectedOption = -1;
    submitted = false;
    var labels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    for (var i = 0; i < q.options.length; i++) {
      (function(idx) {
        var li = document.createElement("li");
        li.className = "option-item";
        li.innerHTML =
          '<input type="radio" name="option" value="' + idx + '" id="opt' + idx + '">' +
          '<span class="option-label">' + labels[idx] + '.</span> ' +
          '<span>' + escapeHtml(q.options[idx]) + '</span>';
        li.addEventListener("click", function() {
          if (submitted) return;
          selectedOption = idx;
          document.getElementById("opt" + idx).checked = true;
          submitBtn.disabled = false;
          // 移除其他选中样式
          var items = optionsList.querySelectorAll(".option-item");
          for (var j = 0; j < items.length; j++) {
            items[j].style.borderColor = (j === idx) ? "#4a90d9" : "#ddd";
          }
        });
        optionsList.appendChild(li);
      })(i);
    }

    // 重置按钮和解释框
    submitBtn.disabled = true;
    submitBtn.style.display = "inline-block";
    nextBtn.style.display = "none";
    explanationBox.classList.remove("show", "correct", "wrong");
    explanationBox.textContent = "";
  }

  /** 提交答案 */
  function handleSubmit() {
    if (submitted || selectedOption < 0) return;
    submitted = true;

    var q = currentList[currentIndex];
    var isCorrect = selectedOption === q.correct;

    // 更新进度
    if (!progress[q.id]) {
      progress[q.id] = { correct: 0, wrong: 0 };
    }
    if (isCorrect) {
      progress[q.id].correct++;
    } else {
      progress[q.id].wrong++;
    }
    saveProgress();

    // 高亮选项
    var items = optionsList.querySelectorAll(".option-item");
    for (var i = 0; i < items.length; i++) {
      items[i].classList.add("disabled");
      items[i].querySelector("input").disabled = true;
      if (i === q.correct) {
        items[i].classList.add("correct-answer");
      }
      if (i === selectedOption && !isCorrect) {
        items[i].classList.add("wrong-answer");
      }
    }

    // 显示解释
    explanationBox.textContent = (isCorrect ? "✅ 回答正确！" : "❌ 回答错误。") + " " + q.explanation;
    explanationBox.classList.add("show", isCorrect ? "correct" : "wrong");

    // 按钮状态
    submitBtn.disabled = true;
    nextBtn.style.display = "inline-block";

    // 刷新大纲（更新掌握度）
    renderOutline();
  }

  /** 下一题 */
  function handleNext() {
    cycleNotice.classList.remove("show");
    currentIndex++;
    if (currentIndex >= currentList.length) {
      currentIndex = 0;
      // 循环时重新排序
      buildSortedList();
      cycleNotice.classList.add("show");
    }
    renderQuestion();
  }

  // ==================== 导入题库 ====================

  /** 验证并加载用户JSON题库 */
  function handleLoadQuestionBank() {
    var text = importTextarea.value.trim();
    if (!text) {
      alert("请粘贴题库JSON数据。");
      return;
    }

    var parsed;
    try {
      parsed = JSON.parse(text);
    } catch (e) {
      alert("JSON格式错误：" + e.message);
      return;
    }

    if (!Array.isArray(parsed) || parsed.length === 0) {
      alert("题库必须是非空的JSON数组。");
      return;
    }

    // 基本格式校验
    for (var i = 0; i < parsed.length; i++) {
      var q = parsed[i];
      if (!q.id || !q.knowledgePoint || !q.question || !Array.isArray(q.options) || typeof q.correct !== "number") {
        alert("第" + (i + 1) + "道题格式不正确，请检查必需字段：id, knowledgePoint, question, options, correct。");
        return;
      }
    }

    // 替换题库并重置进度
    questions = parsed;
    progress = {};
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch (e) { /* 静默处理 */ }
    initializeApp();
    alert("题库加载成功！已重置所有学习进度。");
  }

  /** 重置学习进度 */
  function handleReset() {
    if (!confirm("确认重置所有学习进度？此操作不可撤销。")) return;
    progress = {};
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch (e) { /* 静默处理 */ }
    loadProgress();
    currentIndex = 0;
    cycleNotice.classList.remove("show");
    buildSortedList();
    renderOutline();
    renderQuestion();
  }

  // ==================== 工具函数 ====================

  /** HTML转义防止XSS */
  function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ==================== 初始化 ====================

  /** 初始化/重置应用状态 */
  function initializeApp() {
    loadProgress();
    extractKnowledgePoints();
    currentKP = null;
    currentIndex = 0;
    cycleNotice.classList.remove("show");
    buildSortedList();
    renderOutline();

    if (questions.length > 0) {
      renderQuestion();
    } else {
      practiceContent.style.display = "none";
      emptyState.style.display = "block";
      emptyState.textContent = "题库为空，请导入题库开始学习。";
    }
  }

  // ==================== 事件绑定 ====================

  submitBtn.addEventListener("click", handleSubmit);
  nextBtn.addEventListener("click", handleNext);
  loadBtn.addEventListener("click", handleLoadQuestionBank);
  resetBtn.addEventListener("click", handleReset);

  importToggle.addEventListener("click", function() {
    var isOpen = importBody.classList.toggle("show");
    importArrow.classList.toggle("open", isOpen);
  });

  // ==================== 启动 ====================
  questions = DEFAULT_QUESTIONS.slice();
  initializeApp();

})();
</script>
</body>
</html>
